name: Publish Python distributions to PyPI

on:
  release:
    types: [ published ]

env:
  PACKAGE_NAME: exchange_calendars_extensions
  MODULE_NAME: exchange_calendars_extensions
  PYTHON_VERSION: "3.13"

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build-and-publish-testpypi:
    name: Build and publish Python distributions to TestPyPI.
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Required for trusted publishing.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false  # No cache when building RCs or releases.
      - name: Set up Python
        shell: bash
        run: uv python install ${PYTHON_VERSION}
      - name: Determine package version.
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          export PACKAGE_VERSION=${REF_NAME}
          echo "Version is $PACKAGE_VERSION."
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
      - name: Build package
        run: uv build
      - name: Publish package to Test PyPI.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
      - name: Test that the package can be installed and imported (Test PyPI).
        shell: bash
        run: |
          i=0
          max=10
          exists=0
          while [ $i -lt $max ] && [ $exists -eq 0 ]; do
              i=$(expr $i + 1)
              if curl -f -s https://test.pypi.org/pypi/${PACKAGE_NAME}/json | jq -e ".releases | has(\"${PACKAGE_VERSION}\")" &> /dev/null; then
                  echo "$i/$max Package has appeared in index."
                  exists=1
              else
                  echo "$i/$max Package has not appeared in index yet. Sleeping 5s."
                  sleep 5s
              fi
          done
          if [ $exists -ne 0 ]; then
              sleep 5s
              i=0
              max=3
              while [ $i -lt $max ]; do
                  if uv run -n --refresh --default-index https://test.pypi.org/simple --index https://pypi.org/simple --index-strategy unsafe-best-match --with "${PACKAGE_NAME}==${PACKAGE_VERSION}" --no-project --exclude-newer-package "${PACKAGE_NAME}=false" -- python -c "from importlib.metadata import version;print(version(\"${MODULE_NAME}\"))"; then
                      exit 0
                  else
                      echo "The command failed. Retrying $i/$max."
                      i=$(expr $i + 1)
                      sleep 5s
                  fi
              done
              echo "The command failed $i/$max times. Failing the job."
              exit 1
          else
              echo "The package was not found in the package index. Test installation and import failed."
              exit 1
          fi
  build-and-publish-pypi:
    name: Build and publish Python distributions to PyPI.
    needs: build-and-publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false  # No cache when building RCs or releases.
      - name: Set up Python
        shell: bash
        run: uv python install ${PYTHON_VERSION}
      - name: Determine package version.
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          export PACKAGE_VERSION=${REF_NAME}
          echo "Version is $PACKAGE_VERSION."
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
      - name: Build package
        run: uv build
      - name: Publish package to PyPI.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      - name: Test that the package can be installed and imported (PyPI).
        shell: bash
        run: |
          i=0
          max=10
          exists=0
          while [ $i -lt $max ] && [ $exists -eq 0 ]; do
              i=$(expr $i + 1)
              if curl -f -s https://pypi.org/pypi/${PACKAGE_NAME}/json | jq -e ".releases | has(\"${PACKAGE_VERSION}\")" &> /dev/null; then
                  echo "$i/$max Package has appeared in index."
                  exists=1
              else
                  echo "$i/$max Package has not appeared in index yet. Sleeping 5s."
                  sleep 5s
              fi
          done
          if [ $exists -ne 0 ]; then
              sleep 5s
              i=0
              max=3
              while [ $i -lt $max ]; do
                  if uv run -n --refresh --default-index https://pypi.org/simple --index https://pypi.org/simple --with "${PACKAGE_NAME}==${PACKAGE_VERSION}" --no-project --exclude-newer-package "${PACKAGE_NAME}=false" -- python -c "from importlib.metadata import version;print(version(\"${MODULE_NAME}\"))"; then
                      exit 0
                  else
                      echo "The command failed. Retrying $i/$max."
                      i=$(expr $i + 1)
                      sleep 5s
                  fi
              done
              echo "The command failed $i/$max times. Failing the job."
              exit 1
          else
              echo "The package was not found in the package index. Test installation and import failed."
              exit 1
          fi
  publish-docs:
    name: Publish docs to GH Pages.
    needs: build-and-publish-pypi
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false
      - name: Set up Python
        shell: bash
        run: uv python install ${PYTHON_VERSION}
      - run: uv sync --locked --only-group doc
      - run: uv run --no-sync zensical build --clean
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        id: deployment
